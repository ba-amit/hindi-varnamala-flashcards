<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <title>Hindi Varnamala Flashcards</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="वर्णमाला" />

  <style>
    :root {
      --bg1: #fff8e7;
      --bg2: #e8f7ff;
      --card: #ffffff;
      --ink: #1f2937;
      --accent: #ff8a3d;
      --accent2: #3b82f6;
      --muted: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Noto Sans Devanagari", "Mangal", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(920px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .pill {
      background: rgba(255,255,255,.8);
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 3px 10px rgba(0,0,0,.06);
    }

    .scene {
      perspective: 1200px;
      width: 100%;
      height: min(58vh, 430px);
      min-height: 330px;
      margin: 0 auto 18px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s ease;
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 18px 45px rgba(31, 41, 55, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
      border: 5px solid rgba(255,255,255,.85);
    }

    .front {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,138,61,.18), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(59,130,246,.16), transparent 30%),
        #fff;
    }

    .back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 75% 20%, rgba(16,185,129,.18), transparent 28%),
        radial-gradient(circle at 20% 85%, rgba(168,85,247,.16), transparent 30%),
        #fff;
    }

    .letter {
      font-size: clamp(7rem, 24vw, 13rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent2);
      text-shadow: 0 6px 0 rgba(59,130,246,.10);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .02em;
    }

    .emoji {
      font-size: clamp(4.5rem, 15vw, 8rem);
      line-height: 1;
      margin-bottom: 10px;
    }

    .word {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 800;
      color: #0f766e;
      margin-bottom: 6px;
    }

    .roman {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--muted);
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .soundBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 16px rgba(0,0,0,.15);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,.10);
    }

    button:active { transform: scale(.98); }

    .primary { background: var(--accent2); color: white; }
    .secondary { background: white; color: var(--ink); }
    .shuffle { background: var(--accent); color: white; }

    .footer {
      margin-top: 14px;
      font-size: .9rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .controls { grid-template-columns: repeat(2, 1fr); }
      .scene { min-height: 360px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>हिंदी वर्णमाला फ़्लैशकार्ड</h1>
    <p class="subtitle">अक्षर पहचानो, फिर कार्ड पलटकर उत्तर देखो</p>

    <div class="status">
      <div class="pill" id="counter">1 / 1</div>
      <div class="pill" id="setName">स्वर + व्यंजन</div>
    </div>

    <label class="toggle">
      <input type="checkbox" id="autoSpeak" />
      🔊 हर कार्ड पर आवाज़ अपने आप बोले
    </label>

    <section class="scene" id="scene" aria-label="Flashcard. Click to flip.">
      <div class="card" id="card">
        <div class="face front">
          <button class="soundBtn" id="speakLetterBtn" title="अक्षर सुनें">🔊</button>
          <div class="letter" id="letter">अ</div>
          <div class="hint">यह कौन-सा अक्षर है?</div>
        </div>
        <div class="face back">
          <button class="soundBtn" id="speakWordBtn" title="शब्द सुनें">🔊</button>
          <div class="emoji" id="emoji">🍎</div>
          <div class="word" id="word">अनार</div>
          <div class="roman" id="roman">Anaar</div>
        </div>
      </div>
    </section>

    <div class="controls">
      <button class="secondary" id="prevBtn">← पिछला</button>
      <button class="primary" id="flipBtn">पलटें</button>
      <button class="secondary" id="nextBtn">अगला →</button>
      <button class="shuffle" id="shuffleBtn">🔀 फिर से मिलाएँ</button>
    </div>

    <div class="footer">
      Keyboard: ← Previous · Space Flip · → Next · S Shuffle · V Voice
    </div>
  </main>

  <script>
    const cards = [
      ["अ","अनार","Anaar","🍎"], ["आ","आम","Aam","🥭"], ["इ","इमली","Imli","🫘"],
      ["ई","ईख","Eekh","🎋"], ["उ","उल्लू","Ullu","🦉"], ["ऊ","ऊन","Oon","🧶"],
      ["ऋ","ऋषि","Rishi","🧘"], ["ए","एड़ी","Edi","🦶"], ["ऐ","ऐनक","Ainak","👓"],
      ["ओ","ओखली","Okhli","🥣"], ["औ","औजार","Auzaar","🛠️"], ["अं","अंगूर","Angoor","🍇"],
      ["अः","दुःख","Dukh","😢"],

      ["क","कबूतर","Kabootar","🕊️"], ["ख","खरगोश","Khargosh","🐇"], ["ग","गमला","Gamla","🪴"],
      ["घ","घर","Ghar","🏠"], ["ङ","अंग","Ang","🧍"], ["च","चम्मच","Chammach","🥄"],
      ["छ","छतरी","Chhatri","☂️"], ["ज","जहाज़","Jahaaz","✈️"], ["झ","झंडा","Jhanda","🚩"],
      ["ञ","पंच","Panch","✋"], ["ट","टमाटर","Tamatar","🍅"], ["ठ","ठेला","Thela","🛒"],
      ["ड","डमरू","Damru","🥁"], ["ढ","ढक्कन","Dhakkan","🫙"], ["ण","गणेश","Ganesh","🐘"],
      ["त","तरबूज","Tarbooz","🍉"], ["थ","थाली","Thaali","🍽️"], ["द","दवात","Davaat","🖋️"],
      ["ध","धनुष","Dhanush","🏹"], ["न","नल","Nal","🚰"], ["प","पतंग","Patang","🪁"],
      ["फ","फल","Phal","🍊"], ["ब","बकरी","Bakri","🐐"], ["भ","भालू","Bhalu","🐻"],
      ["म","मछली","Machhli","🐟"], ["य","यज्ञ","Yagya","🔥"], ["र","रथ","Rath","🛺"],
      ["ल","लट्टू","Lattu","🪀"], ["व","वन","Van","🌳"], ["श","शेर","Sher","🦁"],
      ["ष","षट्कोण","Shatkon","⬡"], ["स","सेब","Seb","🍎"], ["ह","हाथी","Haathi","🐘"],
      ["क्ष","क्षत्रिय","Kshatriya","🛡️"], ["त्र","त्रिशूल","Trishul","🔱"], ["ज्ञ","ज्ञानी","Gyaani","🧠"]
    ];

    let deck = [];
    let index = 0;
    let flipped = false;

    const cardEl = document.getElementById("card");
    const letterEl = document.getElementById("letter");
    const wordEl = document.getElementById("word");
    const romanEl = document.getElementById("roman");
    const emojiEl = document.getElementById("emoji");
    const counterEl = document.getElementById("counter");
    const autoSpeakEl = document.getElementById("autoSpeak");

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    let hindiVoice = null;
    function pickVoice() {
      const voices = speechSynthesis.getVoices();
      hindiVoice = voices.find(v => v.lang === "hi-IN")
        || voices.find(v => v.lang && v.lang.startsWith("hi"))
        || null;
    }
    if ("speechSynthesis" in window) {
      pickVoice();
      speechSynthesis.onvoiceschanged = pickVoice;
    }

    function speakBrowser(text, rate = 0.6) {
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "hi-IN";
      if (hindiVoice) utter.voice = hindiVoice;
      utter.rate = rate;
      utter.pitch = 1;
      utter.volume = 1;
      speechSynthesis.speak(utter);
    }

    // iOS blocks speechSynthesis until it has been primed inside a real user
    // gesture, so prime it with an empty utterance on the first touch/click.
    let speechUnlocked = false;
    function unlockSpeech() {
      if (speechUnlocked || !("speechSynthesis" in window)) return;
      speechUnlocked = true;
      const warmup = new SpeechSynthesisUtterance("");
      warmup.volume = 0;
      speechSynthesis.speak(warmup);
      pickVoice();
    }
    document.addEventListener("touchend", unlockSpeech, { once: true });
    document.addEventListener("click", unlockSpeech, { once: true });
    document.addEventListener("keydown", unlockSpeech, { once: true });

    const ttsAudio = new Audio();
    function speak(text) {
      // On iOS the HTML5 audio path is silenced by the ringer switch and the
      // async play() fallback runs too late to keep the user-gesture context,
      // so go straight to speechSynthesis there.
      if (isIOS) {
        speakBrowser(text);
        return;
      }
      const url = "https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=hi&client=gtx&q="
        + encodeURIComponent(text);
      ttsAudio.onerror = () => speakBrowser(text);
      ttsAudio.src = url;
      ttsAudio.play().catch(() => speakBrowser(text));
    }

    function speakLetter() {
      const [letter] = deck[index];
      speak(letter);
    }

    function speakWord() {
      const [, word] = deck[index];
      speak(word);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function render() {
      const [letter, word, roman, emoji] = deck[index];
      letterEl.textContent = letter;
      wordEl.textContent = word;
      romanEl.textContent = roman;
      emojiEl.textContent = emoji;
      counterEl.textContent = `${index + 1} / ${deck.length}`;
      flipped = false;
      cardEl.classList.remove("flipped");
      if (autoSpeakEl.checked) speakLetter();
    }

    function flipCard() {
      flipped = !flipped;
      cardEl.classList.toggle("flipped", flipped);
      if (autoSpeakEl.checked) {
        flipped ? speakWord() : speakLetter();
      }
    }

    function nextCard() {
      index = (index + 1) % deck.length;
      render();
    }

    function prevCard() {
      index = (index - 1 + deck.length) % deck.length;
      render();
    }

    function reshuffle() {
      deck = shuffle(cards);
      index = 0;
      render();
    }

    document.getElementById("flipBtn").addEventListener("click", flipCard);
    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", prevCard);
    document.getElementById("shuffleBtn").addEventListener("click", reshuffle);
    document.getElementById("scene").addEventListener("click", flipCard);

    document.getElementById("speakLetterBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakLetter();
    });
    document.getElementById("speakWordBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakWord();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextCard();
      if (e.key === "ArrowLeft") prevCard();
      if (e.key === " ") { e.preventDefault(); flipCard(); }
      if (e.key.toLowerCase() === "s") reshuffle();
      if (e.key.toLowerCase() === "v") flipped ? speakWord() : speakLetter();
    });

    reshuffle();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
