<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <title>3rd Standard Teaching Assistant</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="3rd Standard" />

  <style>
    :root {
      --bg1: #fff8e7;
      --bg2: #e8f7ff;
      --card: #ffffff;
      --ink: #1f2937;
      --accent: #ff8a3d;
      --accent2: #3b82f6;
      --muted: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Noto Sans Devanagari", "Mangal", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(920px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .pill {
      background: rgba(255,255,255,.8);
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 3px 10px rgba(0,0,0,.06);
    }

    .scene {
      perspective: 1200px;
      width: 100%;
      height: min(58vh, 430px);
      min-height: 330px;
      margin: 0 auto 18px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s ease;
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 18px 45px rgba(31, 41, 55, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
      border: 5px solid rgba(255,255,255,.85);
    }

    .front {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,138,61,.18), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(59,130,246,.16), transparent 30%),
        #fff;
    }

    .back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 75% 20%, rgba(16,185,129,.18), transparent 28%),
        radial-gradient(circle at 20% 85%, rgba(168,85,247,.16), transparent 30%),
        #fff;
    }

    .letter {
      font-size: clamp(7rem, 24vw, 13rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent2);
      text-shadow: 0 6px 0 rgba(59,130,246,.10);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .02em;
    }

    .emoji {
      font-size: clamp(4.5rem, 15vw, 8rem);
      line-height: 1;
      margin-bottom: 10px;
    }

    .word {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 800;
      color: #0f766e;
      margin-bottom: 6px;
    }

    .roman {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--muted);
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .soundBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 16px rgba(0,0,0,.15);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,.10);
    }

    button:active { transform: scale(.98); }

    .primary { background: var(--accent2); color: white; }
    .secondary { background: white; color: var(--ink); }
    .shuffle { background: var(--accent); color: white; }

    .footer {
      margin-top: 14px;
      font-size: .9rem;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tab {
      background: rgba(255,255,255,.75);
      color: var(--muted);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: .95rem;
    }

    .tab.active { background: var(--accent2); color: #fff; }
    .tab.set.active { background: var(--accent); color: #fff; }

    .sets { margin-bottom: 16px; }
    .sets .tab { padding: 8px 14px; font-size: .85rem; }

    .listen {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background:
        radial-gradient(circle at 25% 20%, rgba(168,85,247,.18), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255,138,61,.18), transparent 30%),
        #fff;
      box-shadow: 0 18px 45px rgba(31, 41, 55, .18);
      border: 5px solid rgba(255,255,255,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      padding: 24px;
    }

    .earBtn {
      width: clamp(130px, 34vw, 190px);
      height: clamp(130px, 34vw, 190px);
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      font-size: clamp(3.5rem, 12vw, 5rem);
      box-shadow: 0 14px 30px rgba(59,130,246,.35);
    }

    .listen .hint { margin-top: 6px; font-size: 1.05rem; }
    .listen .note { color: var(--muted); font-size: .85rem; max-width: 30ch; }
    .hidden { display: none !important; }

    /* --- maths quiz --- */
    .quiz {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background:
        radial-gradient(circle at 20% 15%, rgba(16,185,129,.16), transparent 30%),
        radial-gradient(circle at 85% 85%, rgba(59,130,246,.16), transparent 30%),
        #fff;
      box-shadow: 0 18px 45px rgba(31, 41, 55, .18);
      border: 5px solid rgba(255,255,255,.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      overflow-y: auto;
    }

    .qLabel {
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .04em;
      font-size: .9rem;
      text-transform: uppercase;
    }

    .qText {
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.35;
      max-width: 24ch;
    }

    .ansInput {
      width: min(260px, 80%);
      padding: 14px 18px;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      text-align: center;
      border: 3px solid rgba(59,130,246,.35);
      border-radius: 18px;
      outline: none;
      font-family: inherit;
    }

    .ansInput:focus { border-color: var(--accent2); }

    .choices { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .choice {
      background: #fff;
      border: 3px solid rgba(59,130,246,.35);
      color: var(--ink);
      min-width: 76px;
      padding: 12px 18px;
      font-size: 1.4rem;
    }

    .choice.picked { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    .feedback { font-weight: 800; font-size: 1.15rem; min-height: 1.6em; }
    .feedback.right { color: #0f766e; }
    .feedback.wrong { color: #be123c; }

    /* --- reading view --- */
    .reader {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background:
        radial-gradient(circle at 15% 12%, rgba(59,130,246,.10), transparent 30%),
        radial-gradient(circle at 88% 90%, rgba(255,138,61,.12), transparent 30%),
        #fff;
      box-shadow: 0 18px 45px rgba(31, 41, 55, .18);
      border: 5px solid rgba(255,255,255,.85);
      padding: 26px clamp(18px, 4vw, 40px);
      overflow-y: auto;
      text-align: left;
    }

    .readTitle {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .readMeta { color: var(--muted); font-weight: 700; margin-bottom: 16px; font-size: .95rem; }

    .readBody p {
      font-size: clamp(1.1rem, 2.6vw, 1.35rem);
      line-height: 1.75;
      margin: 0 0 16px;
      max-width: 60ch;
    }

    .readBody p.speaking { background: rgba(255,214,102,.35); border-radius: 8px; }
    .readBody .empty { color: var(--muted); font-weight: 700; }

    .navGroup {
      margin: 14px 0 4px;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-left: 14px;
    }

    /* --- side panel --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 250px;
      padding: 22px 16px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      box-shadow: 4px 0 24px rgba(31,41,55,.10);
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      z-index: 30;
    }

    .sidebar h2 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      color: var(--muted);
      letter-spacing: .04em;
    }

    .navItem {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      padding: 12px 14px;
      font-size: .98rem;
    }

    .navItem:hover { background: rgba(59,130,246,.08); }
    .navItem.active { background: var(--accent2); color: #fff; }
    .navItem .ico { font-size: 1.25rem; }

    .menuBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 40;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(255,255,255,.92);
      font-size: 1.2rem;
      padding: 0;
      display: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.35);
      z-index: 25;
      display: none;
    }

    .overlay.show { display: block; }

    body { padding-left: 290px; }

    @media (max-width: 900px) {
      body { padding-left: 20px; }
      .menuBtn { display: flex; align-items: center; justify-content: center; }
      .sidebar {
        transform: translateX(-105%);
        transition: transform .25s ease;
      }
      .sidebar.open { transform: none; }
      /* the hamburger would sit on top of the open drawer's heading */
      body:has(.sidebar.open) .menuBtn { display: none; }
      h1 { margin-top: 44px; }
    }

    @media (max-width: 640px) {
      .controls { grid-template-columns: repeat(2, 1fr); }
      .scene { min-height: 360px; }
    }
  </style>
</head>
<body>
  <button class="menuBtn" id="menuBtn" aria-label="अभ्यास सूची">☰</button>
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <h2>Activities</h2>
    <nav id="activityNav"></nav>
  </aside>

  <main class="app">
    <h1 id="pageTitle">3rd Standard Teaching Assistant</h1>
    <p class="subtitle" id="subtitle">अक्षर पहचानो, फिर कार्ड पलटकर उत्तर देखो</p>

    <div class="tabs sets hidden" id="skillFilter"></div>
    <div class="tabs sets hidden" id="chapterFilter"></div>

    <div class="tabs sets" id="setFilter">
      <button class="tab set active" data-set="all">सब</button>
      <button class="tab set" data-set="swar">स्वर</button>
      <button class="tab set" data-set="vyanjan">व्यंजन</button>
    </div>

    <div class="status">
      <div class="pill" id="counter">1 / 1</div>
      <div class="pill" id="setName">स्वर + व्यंजन</div>
    </div>

    <label class="toggle" id="autoSpeakRow">
      <input type="checkbox" id="autoSpeak" />
      🔊 हर कार्ड पर आवाज़ अपने आप बोले
    </label>

    <label class="toggle hidden" id="withWordRow">
      <input type="checkbox" id="withWord" />
      🗣️ अक्षर के साथ उदाहरण शब्द भी बोलें
    </label>

    <section class="scene" id="scene" aria-label="Flashcard. Click to flip.">
      <div class="card" id="card">
        <div class="face front">
          <button class="soundBtn" id="speakLetterBtn" title="अक्षर सुनें">🔊</button>
          <div class="letter" id="letter">अ</div>
          <div class="hint">यह कौन-सा अक्षर है?</div>
        </div>
        <div class="face back">
          <button class="soundBtn" id="speakWordBtn" title="शब्द सुनें">🔊</button>
          <div class="emoji" id="emoji">🍎</div>
          <div class="word" id="word">अनार</div>
          <div class="roman" id="roman">Anaar</div>
        </div>
      </div>
    </section>

    <section class="scene hidden" id="listenScene">
      <div class="listen">
        <button class="earBtn" id="earBtn" title="अक्षर सुनें">🔊</button>
        <div class="hint">सुनो और कॉपी में लिखो</div>
        <div class="note">फिर से सुनने के लिए 🔊 दबाओ</div>
      </div>
    </section>

    <section class="scene hidden" id="mathScene">
      <div class="quiz">
        <div class="qLabel" id="qLabel">Addition</div>
        <div class="qText" id="qText">431 + 128 = ?</div>
        <input class="ansInput" id="ansInput" type="text" inputmode="numeric"
               autocomplete="off" placeholder="Answer" />
        <div class="choices hidden" id="choices"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </section>

    <section class="scene hidden" id="readScene">
      <div class="reader">
        <div class="readTitle" id="readTitle"></div>
        <div class="readMeta" id="readMeta"></div>
        <div class="readBody" id="readBody"></div>
      </div>
    </section>

    <div class="controls hidden" id="readerControls">
      <button class="primary" id="readAloudBtn">🔊 Read aloud</button>
      <button class="secondary" id="stopReadBtn">⏹ Stop</button>
    </div>

    <div class="controls" id="readControls">
      <button class="secondary" id="prevBtn">← पिछला</button>
      <button class="primary" id="flipBtn">पलटें</button>
      <button class="secondary" id="nextBtn">अगला →</button>
      <button class="shuffle" id="shuffleBtn">🔀 फिर से मिलाएँ</button>
    </div>

    <div class="controls hidden" id="writeControls">
      <button class="primary" id="repeatBtn">🔁 फिर से सुनो</button>
      <button class="secondary" id="nextWriteBtn">अगला अक्षर →</button>
      <button class="shuffle" id="shuffleWriteBtn">🔀 फिर से मिलाएँ</button>
    </div>

    <div class="controls hidden" id="mathControls">
      <button class="primary" id="checkBtn">✓ Check</button>
      <button class="secondary" id="nextQBtn">Next question →</button>
      <button class="shuffle" id="restartBtn">🔄 New set</button>
    </div>

    <div class="footer" id="footer">
      Keyboard: ← Previous · Space Flip · → Next · S Shuffle · V Voice
    </div>
  </main>

  <!-- Reading text: chapter.js defines window.ENGLISH_CHAPTERS. chapters.js, if
       present, overrides it so local edits can be kept separate. -->
  <script src="chapter.js"></script>
  <script src="chapters.js"></script>
  <script>
    const cards = [
      ["अ","अनार","Anaar","🍎"], ["आ","आम","Aam","🥭"], ["इ","इमली","Imli","🫘"],
      ["ई","ईख","Eekh","🎋"], ["उ","उल्लू","Ullu","🦉"], ["ऊ","ऊन","Oon","🧶"],
      ["ऋ","ऋषि","Rishi","🧘"], ["ए","एड़ी","Edi","🦶"], ["ऐ","ऐनक","Ainak","👓"],
      ["ओ","ओखली","Okhli","🥣"], ["औ","औजार","Auzaar","🛠️"], ["अं","अंगूर","Angoor","🍇"],
      ["अः","दुःख","Dukh","😢"],

      ["क","कबूतर","Kabootar","🕊️"], ["ख","खरगोश","Khargosh","🐇"], ["ग","गमला","Gamla","🪴"],
      ["घ","घर","Ghar","🏠"], ["ङ","अंग","Ang","🧍"], ["च","चम्मच","Chammach","🥄"],
      ["छ","छतरी","Chhatri","☂️"], ["ज","जहाज़","Jahaaz","✈️"], ["झ","झंडा","Jhanda","🚩"],
      ["ञ","पंच","Panch","✋"], ["ट","टमाटर","Tamatar","🍅"], ["ठ","ठेला","Thela","🛒"],
      ["ड","डमरू","Damru","🥁"], ["ढ","ढक्कन","Dhakkan","🫙"], ["ण","गणेश","Ganesh","🐘"],
      ["त","तरबूज","Tarbooz","🍉"], ["थ","थाली","Thaali","🍽️"], ["द","दवात","Davaat","🖋️"],
      ["ध","धनुष","Dhanush","🏹"], ["न","नल","Nal","🚰"], ["प","पतंग","Patang","🪁"],
      ["फ","फल","Phal","🍊"], ["ब","बकरी","Bakri","🐐"], ["भ","भालू","Bhalu","🐻"],
      ["म","मछली","Machhli","🐟"], ["य","यज्ञ","Yagya","🔥"], ["र","रथ","Rath","🛺"],
      ["ल","लट्टू","Lattu","🪀"], ["व","वन","Van","🌳"], ["श","शेर","Sher","🦁"],
      ["ष","षट्कोण","Shatkon","⬡"], ["स","सेब","Seb","🍎"], ["ह","हाथी","Haathi","🐘"],
      ["क्ष","क्षत्रिय","Kshatriya","🛡️"], ["त्र","त्रिशूल","Trishul","🔱"], ["ज्ञ","ज्ञानी","Gyaani","🧠"]
    ];

    // Data order: first 13 entries are swar, the rest are vyanjan.
    const SWAR_COUNT = 13;
    const sets = {
      all: () => cards,
      swar: () => cards.slice(0, SWAR_COUNT),
      vyanjan: () => cards.slice(SWAR_COUNT)
    };
    const setLabels = { all: "स्वर + व्यंजन", swar: "स्वर", vyanjan: "व्यंजन" };

    // ---------------- maths question generators ----------------
    // Each skill mirrors an exercise type from the class-3 workbook (ch.1
    // Numbers, ch.2 Addition) but makes fresh numbers every time, so the kid
    // never runs out of practice. gen() returns:
    //   { q: question text, a: answer, type: "number" | "choice", options?: [] }
    const rnd = (min, max) => min + Math.floor(Math.random() * (max - min + 1));
    const digitsOf = n => String(n).split("").map(Number);
    const pickSome = (arr, n) => shuffle(arr).slice(0, n);
    const roundTo = (n, step) => Math.round(n / step) * step;
    const PLACES = [["ones", 1], ["tens", 10], ["hundreds", 100], ["thousands", 1000]];

    // Two 3-digit numbers whose per-column digits never exceed 9 (no carrying).
    function noCarryPair() {
      const a = [], b = [];
      for (let i = 0; i < 3; i++) {
        const x = rnd(i === 0 ? 1 : 0, 8);
        a.push(x);
        b.push(rnd(i === 0 ? 1 : 0, 9 - x));
      }
      return [Number(a.join("")), Number(b.join(""))];
    }

    const MATH_SKILLS = [
      {
        id: "placeValue",
        label: "Place value",
        gen() {
          const n = rnd(1000, 9999);
          const p = rnd(0, 3);
          const digit = digitsOf(n)[3 - p];
          return {
            q: `In ${n}, what is the place value of the ${PLACES[p][0]} digit (${digit})?`,
            a: digit * PLACES[p][1]
          };
        }
      },
      {
        id: "expanded",
        label: "Expanded form",
        gen() {
          const n = rnd(1000, 9999);
          const parts = digitsOf(n).map((x, i) => x * Math.pow(10, 3 - i));
          return { q: `Write the standard form: ${parts.join(" + ")} = ?`, a: n };
        }
      },
      {
        id: "compare",
        label: "Compare >, <, =",
        gen() {
          const a = rnd(100, 9999);
          const b = Math.random() < 0.25 ? a : rnd(100, 9999);
          return {
            q: `${a} ___ ${b}`,
            a: a > b ? ">" : a < b ? "<" : "=",
            type: "choice",
            options: [">", "<", "="]
          };
        }
      },
      {
        id: "successor",
        label: "Successor & predecessor",
        gen() {
          const n = rnd(100, 9998);
          const after = Math.random() < 0.5;
          return {
            q: `Which number comes just ${after ? "after" : "before"} ${n}?`,
            a: after ? n + 1 : n - 1
          };
        }
      },
      {
        id: "skipCount",
        label: "Skip counting",
        gen() {
          const step = [2, 10, 100, 1000][rnd(0, 3)];
          const start = rnd(1000, 5000);
          const seq = [0, 1, 2, 3].map(i => start + i * step);
          return { q: `Skip count in ${step}s: ${seq.slice(0, 3).join(", ")}, ___`, a: seq[3] };
        }
      },
      {
        id: "rounding",
        label: "Rounding off",
        gen() {
          const step = [10, 100, 1000][rnd(0, 2)];
          const n = rnd(step === 1000 ? 1000 : 100, 9999);
          return { q: `Round off ${n} to the nearest ${step}.`, a: roundTo(n, step) };
        }
      },
      {
        id: "formNumber",
        label: "Form a number",
        gen() {
          const digits = pickSome([1, 2, 3, 4, 5, 6, 7, 8, 9], 4);
          const biggest = Math.random() < 0.5;
          const sorted = [...digits].sort((x, y) => biggest ? y - x : x - y);
          return {
            q: `Using the digits ${digits.join(", ")} without repeating any digit, write the ${biggest ? "largest" : "smallest"} 4-digit number.`,
            a: Number(sorted.join(""))
          };
        }
      },
      {
        id: "addNoCarry",
        label: "Add (no carrying)",
        gen() {
          const [a, b] = noCarryPair();
          return { q: `${a} + ${b} = ?`, a: a + b };
        }
      },
      {
        id: "addCarry",
        label: "Add (with carrying)",
        gen() {
          const a = rnd(150, 899);
          const b = rnd(150, 899);
          return { q: `${a} + ${b} = ?`, a: a + b };
        }
      },
      {
        id: "addThree",
        label: "Add three numbers",
        gen() {
          const [a, b, c] = [rnd(100, 499), rnd(100, 499), rnd(100, 399)];

      },
      {
        id: "mentalAdd",
        label: "Mental addition",
        gen() {

      },
      {
        id: "missingAddend",
        label: "Missing number",
        gen() {
          const a = rnd(120, 600);
          const b = rnd(50, 380);
          return { q: `${a} + ___ = ${a + b}`, a: b };
        }
      },
      {
        id: "estimateSum",
        label: "Estimate the sum",
        gen() {
          const step = Math.random() < 0.5 ? 10 : 100;
          const nums = [rnd(120, 590), rnd(120, 590), rnd(120, 390)];
          return {
            q: `Estimate ${nums.join(" + ")} by rounding off each number to the nearest ${step}, then adding.`,
            a: nums.reduce((s, n) => s + roundTo(n, step), 0)
          };
        }
      },
      {
        id: "wordProblem",
        label: "Word problems",
        gen() {
          const stories = [
            (x, y, z) => `A library has ${x} storybooks, ${y} academic books and ${z} competition books. How many books are there in all?`,
            (x, y, z) => `Ravi sold ${x} tickets, Meera sold ${y} tickets and Ayesha sold ${z} tickets for the school fest. How many tickets were sold in all?`,
            (x, y, z) => `A garden has ${x} red roses, ${y} pink roses and ${z} white roses. How many roses are there altogether?`,
            (x, y, z) => `Anuj's storybook has ${x} pages, Riya's has ${y} pages and Shaina's has ${z} pages. How many pages are there in all?`,
            (x, y, z) => `A postman delivered ${x} letters in the first week, ${y} in the second week and ${z} in the third week. How many letters did he deliver in all?`
          ];
          const [x, y, z] = [rnd(110, 480), rnd(110, 480), rnd(105, 320)];
          return { q: stories[rnd(0, stories.length - 1)](x, y, z), a: x + y + z };
        }
      }
    ];

    const PEOPLE = ["Rahul", "Meera", "Ravi", "Aisha", "Kabir", "Naina", "Arjun"];
    const PLACE_NAMES = ["Delhi", "Chennai", "Shimla", "India", "Assam", "Jaipur", "Kerala"];
    const DAYS_MONTHS = ["Monday", "Sunday", "February", "August", "Diwali", "Holi"];

    ];

    const pick = arr => arr[rnd(0, arr.length - 1)];
    // Build a 4-option multiple choice: the answer plus distractors, shuffled.
    const choiceQ = (q, answer, distractors) => ({
      q, a: answer, type: "choice", options: shuffle([answer, ...distractors])
    });
    const otherThan = (arr, notThese, n) =>
      shuffle(arr.filter(x => !notThese.includes(x))).slice(0, n);

    const GRAMMAR_SKILLS = [
      {
        id: "nounSpot",
        label: "Find the noun",
        gen() {
          const noun = pick(COMMON_NOUNS);
          return choiceQ("Which of these words is a noun (a naming word)?", noun,
            [...otherThan(VERBS, [], 2), pick(ADJECTIVES)]);
        }
      },
      {
        id: "properNoun",
        label: "Common or proper",
        gen() {
          const proper = Math.random() < 0.5;
          const answer = proper ? pick(PROPER_NOUNS) : pick(COMMON_NOUNS);
          const others = otherThan(proper ? COMMON_NOUNS : PROPER_NOUNS, [answer], 3);
          return choiceQ(`Which of these is a ${proper ? "proper" : "common"} noun?`, answer, others);
        }
      },
      {
        id: "capitals",
        label: "Capital letters",
        gen() {
          const name = pick(PEOPLE);
          const place = pick(PLACE_NAMES);
          const right = `${name} lives in ${place}.`;
          return choiceQ("Which sentence is written correctly?", right, [
            right.toLowerCase(),
            `${name.toLowerCase()} lives in ${place}.`,
            `${name} lives in ${place.toLowerCase()}.`
          ]);
        }

      {
        id: "article",
        label: "a or an",
        gen() {
          const [word, art] = pick(ARTICLE_WORDS);

        }

      {
        id: "plural",
        label: "Singular → plural",
        gen() {
          const [one, many] = pick(PLURALS);
          const fakes = [one + "s", one + "es", one.replace(/y$/, "ies"), one + "ies"]
            .filter(f => f !== many);
          return choiceQ(`What is the plural of "${one}"?`, many, otherThan(fakes, [many], 3));
        }
      },
      {
        id: "pluralSentence",
        label: "Plural in a sentence",
        gen() {
          const [one, many] = pick(PLURALS.filter(([o, m]) => o !== m));
          const frames = [
            n => `I can see three ___ in the garden. (${one})`,
            n => `There are many ___ in our school. (${one})`,
            n => `My friend has two ___ at home. (${one})`
          ];
          const fakes = [one, one + "s", one + "es"].filter(f => f !== many);
          return choiceQ(pick(frames)(one), many, otherThan(fakes, [many], 2));
        }
      },
      {
        id: "feminine",
        label: "Masculine & feminine",
        gen() {
          const [m, f] = pick(GENDER_PAIRS);
          const toFeminine = Math.random() < 0.5;
          const answer = toFeminine ? f : m;
          const pool = GENDER_PAIRS.map(pair => toFeminine ? pair[1] : pair[0]);
          return choiceQ(
            `What is the ${toFeminine ? "feminine" : "masculine"} of "${toFeminine ? m : f}"?`,
            answer, otherThan(pool, [answer], 3));
        }
      },
      {
        id: "genderType",
        label: "Which gender?",
        gen() {
          const kinds = [
            ["masculine", GENDER_PAIRS.map(p => p[0])],
            ["feminine", GENDER_PAIRS.map(p => p[1])],
            ["common", COMMON_GENDER],
            ["neuter", NEUTER_GENDER]
          ];
          const [kind, words] = pick(kinds);
          return {
            q: `What gender is the noun "${pick(words)}"?`,
            a: kind,
            type: "choice",
            options: ["masculine", "feminine", "common", "neuter"]
          };
        }
      },
      {
        id: "collective",
        label: "Collective nouns",
        gen() {
          const [group, word] = pick(COLLECTIVE);

            otherThan(pool, [word], 3));
        }
      },
      {
        id: "material",

        gen() {
          const [thing, stuff] = pick(MATERIAL);

          const answer = pick(words);

            .slice(0, 3).map(c => pick(c[1]));
          return choiceQ(`Which of these is a ${kind}?`, answer, others);
        }
      }

    // Every practice activity is one entry here plus one <section> / controls

    //                               carries the answer (dictation)
    //   speechText                : what 🔊 says for a deck entry
    //   usesSetFilter             : show the स्वर / व्यंजन filter
    //   usesDeck: false           : activity manages its own content (maths)
    //   onKey                     : keyboard handler while active
    const ACTIVITIES = [
      {
        id: "read",
        group: "Hindi",
        icon: "👀",
        label: "अक्षर देखो, बोलो",
        subtitle: "अक्षर पहचानो, फिर कार्ड पलटकर उत्तर देखो",
        footer: "Keyboard: ← Previous · Space Flip · → Next · S Shuffle · V Voice",
        scene: "scene",
        controls: "readControls",
        extras: ["autoSpeakRow"],
        usesSetFilter: true,
        onKey(e) {
          if (e.key === "ArrowRight") nextCard();
          if (e.key === "ArrowLeft") prevCard();
          if (e.key === " ") { e.preventDefault(); flipCard(); }
          if (e.key.toLowerCase() === "s") reshuffle();
          if (e.key.toLowerCase() === "v") flipped ? speakWord() : speakLetter();
        }
      },
      {
        id: "write",
        group: "Hindi",
        icon: "✍️",
        label: "सुनो, लिखो",
        subtitle: "सुनो और कॉपी में लिखो — अक्षर दिखाया नहीं जाएगा",
        footer: "Keyboard: R Repeat · → Next · S Shuffle",
        scene: "listenScene",
        controls: "writeControls",
        extras: ["withWordRow"],
        usesSetFilter: true,
        hideAnswer: true,
        // Bare consonants ("क" vs "ख") are hard to tell apart by ear, so the
        // example word can follow the letter without revealing its shape.
        speechText: ([letter, word]) =>
          withWordEl.checked ? `${letter}, ${letter} से ${word}` : letter,
        onKey(e) {
          if (e.key === "ArrowRight") nextCard();
          if (e.key.toLowerCase() === "s") reshuffle();
          if (e.key.toLowerCase() === "r") speakLetter();
        }
      },
      {
        id: "reading",
        group: "English",
        icon: "📖",
        label: "Read a chapter",
        subtitle: "Pick a chapter and read it — tap Read aloud to listen",
        footer: "Tap a chapter above · Read aloud to listen",
        scene: "readScene",
        controls: "readerControls",
        extras: ["chapterFilter"],
        usesDeck: false,
        onEnter: () => renderChapter()
      },
      {
        id: "comprehension",
        group: "English",
        icon: "❓",
        label: "Story questions",
        subtitle: "Questions about the two stories — answer as many as you like",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        extras: ["skillFilter"],
        usesDeck: false,
        onEnter: () => startQuiz({ bank: COMP_SKILLS, bankId: "comp", test: false }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "grammarPractice",
        group: "English",
        icon: "🔤",
        label: "Grammar practice",
        subtitle: "Pick a topic and answer as many questions as you like",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        extras: ["skillFilter"],
        usesDeck: false,
        onEnter: () => startQuiz({ bank: GRAMMAR_SKILLS, bankId: "grammar", test: false }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "grammarTest",
        group: "English",
        icon: "🧾",
        label: "Grammar test (10 questions)",
        subtitle: "Ten mixed questions — you get a score at the end",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        usesDeck: false,
        onEnter: () => startQuiz({ bank: GRAMMAR_SKILLS, bankId: "grammar", test: true, length: 10 }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "sstPractice",
        group: "Social Studies",
        icon: "🌍",
        label: "Social Studies practice",
        subtitle: "Pick a topic and answer as many questions as you like",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        extras: ["skillFilter"],
        usesDeck: false,
        onEnter: () => startQuiz({ bank: SST_SKILLS, bankId: "sst", test: false }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "sstTest",
        group: "Social Studies",
        icon: "🗺️",
        label: "Social Studies test (10 questions)",
        subtitle: "Ten mixed questions — you get a score at the end",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        usesDeck: false,
        onEnter: () => startQuiz({ bank: SST_SKILLS, bankId: "sst", test: true, length: 10 }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "mathPractice",
        group: "Math",
        icon: "🔢",
        label: "Math practice",
        subtitle: "Pick a skill and solve as many questions as you like",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        extras: ["skillFilter"],
        usesDeck: false,
        onEnter: () => startQuiz({ bank: MATH_SKILLS, bankId: "math", test: false }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      },
      {
        id: "mathTest",
        group: "Math",
        icon: "📝",
        label: "Math test (10 questions)",
        subtitle: "Ten mixed questions — you get a score at the end",
        footer: "Keyboard: Enter · Check / Next question",
        scene: "mathScene",
        controls: "mathControls",
        usesDeck: false,
        onEnter: () => startQuiz({ bank: MATH_SKILLS, bankId: "math", test: true, length: 10 }),
        onKey(e) { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } }
      }
    ];

    let currentSet = "all";
    let mode = ACTIVITIES[0].id;
    const activity = () => ACTIVITIES.find(a => a.id === mode);
    let deck = [];
    let index = 0;
    let flipped = false;

    const cardEl = document.getElementById("card");
    const letterEl = document.getElementById("letter");
    const wordEl = document.getElementById("word");
    const romanEl = document.getElementById("roman");
    const emojiEl = document.getElementById("emoji");
    const counterEl = document.getElementById("counter");
    const setNameEl = document.getElementById("setName");
    const autoSpeakEl = document.getElementById("autoSpeak");
    const withWordEl = document.getElementById("withWord");
    const subtitleEl = document.getElementById("subtitle");
    const footerEl = document.getElementById("footer");
    const navEl = document.getElementById("activityNav");
    const sidebarEl = document.getElementById("sidebar");
    const overlayEl = document.getElementById("overlay");
    const setFilterEl = document.getElementById("setFilter");
    const skillFilterEl = document.getElementById("skillFilter");
    const qLabelEl = document.getElementById("qLabel");
    const qTextEl = document.getElementById("qText");
    const ansInputEl = document.getElementById("ansInput");
    const choicesEl = document.getElementById("choices");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const chapterFilterEl = document.getElementById("chapterFilter");
    const readTitleEl = document.getElementById("readTitle");
    const readMetaEl = document.getElementById("readMeta");
    const readBodyEl = document.getElementById("readBody");
    const readerControlsEl = document.getElementById("readerControls");

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    let hindiVoice = null;
    function pickVoice() {
      const voices = speechSynthesis.getVoices();
      hindiVoice = voices.find(v => v.lang === "hi-IN")
        || voices.find(v => v.lang && v.lang.startsWith("hi"))
        || null;
    }
    if ("speechSynthesis" in window) {
      pickVoice();
      speechSynthesis.onvoiceschanged = pickVoice;
    }

    function speakBrowser(text, rate = 0.6) {
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "hi-IN";
      if (hindiVoice) utter.voice = hindiVoice;
      utter.rate = rate;
      utter.pitch = 1;
      utter.volume = 1;
      speechSynthesis.speak(utter);
    }

    // iOS blocks speechSynthesis until it has been primed inside a real user
    // gesture, so prime it with an empty utterance on the first touch/click.
    let speechUnlocked = false;
    function unlockSpeech() {
      if (speechUnlocked || !("speechSynthesis" in window)) return;
      speechUnlocked = true;
      const warmup = new SpeechSynthesisUtterance("");
      warmup.volume = 0;
      speechSynthesis.speak(warmup);
      pickVoice();
    }
    document.addEventListener("touchend", unlockSpeech, { once: true });
    document.addEventListener("click", unlockSpeech, { once: true });
    document.addEventListener("keydown", unlockSpeech, { once: true });

    const ttsAudio = new Audio();
    function speak(text) {
      // On iOS the HTML5 audio path is silenced by the ringer switch and the
      // async play() fallback runs too late to keep the user-gesture context,
      // so go straight to speechSynthesis there.
      if (isIOS) {
        speakBrowser(text);
        return;
      }
      const url = "https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=hi&client=gtx&q="
        + encodeURIComponent(text);
      ttsAudio.onerror = () => speakBrowser(text);
      ttsAudio.src = url;
      ttsAudio.play().catch(() => speakBrowser(text));
    }

    function speakLetter() {
      const a = activity();
      speak(a.speechText ? a.speechText(deck[index]) : deck[index][0]);
    }

    function speakWord() {
      const [, word] = deck[index];
      speak(word);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function render() {
      const [letter, word, roman, emoji] = deck[index];
      counterEl.textContent = `${index + 1} / ${deck.length}`;
      flipped = false;
      cardEl.classList.remove("flipped");

      if (activity().hideAnswer) {
        // Never put the answer in the DOM — the kid writes it from the sound.
        letterEl.textContent = wordEl.textContent = "";
        romanEl.textContent = emojiEl.textContent = "";
        speakLetter();
        return;
      }

      letterEl.textContent = letter;
      wordEl.textContent = word;
      romanEl.textContent = roman;
      emojiEl.textContent = emoji;
      if (autoSpeakEl.checked) speakLetter();
    }

    function buildNav() {
      navEl.innerHTML = "";
      let group = null;
      ACTIVITIES.forEach(a => {
        if (a.group && a.group !== group) {
          group = a.group;
          const h = document.createElement("div");
          h.className = "navGroup";
          h.textContent = group;
          navEl.appendChild(h);
        }
        const btn = document.createElement("button");
        btn.className = "navItem";
        btn.dataset.id = a.id;
        btn.innerHTML = `<span class="ico"></span><span class="lbl"></span>`;
        btn.querySelector(".ico").textContent = a.icon;
        btn.querySelector(".lbl").textContent = a.label;
        btn.addEventListener("click", () => { setMode(a.id); closeDrawer(); });
        navEl.appendChild(btn);
      });
    }

    function setMode(next) {
      stopReading();
      mode = next;
      const a = activity();
      const ownIds = act => [act.scene, act.controls, ...(act.extras || [])].filter(Boolean);
      const shown = new Set(ownIds(a));
      // Hide every activity's elements, then show the active one's. A block
      // shared by two activities stays visible because `shown` wins.
      ACTIVITIES.forEach(other => ownIds(other).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle("hidden", !shown.has(id));
      }));
      navEl.querySelectorAll(".navItem").forEach(b =>
        b.classList.toggle("active", b.dataset.id === a.id));
      setFilterEl.classList.toggle("hidden", !a.usesSetFilter);
      subtitleEl.textContent = a.subtitle;
      footerEl.textContent = a.footer;
      localStorage.setItem("varnamalaMode", a.id);
      if (a.onEnter) a.onEnter();
      if (a.usesDeck !== false) reshuffle();
    }

    // ---------------- maths quiz engine ----------------
    // Practice mode: endless questions from one skill (or a mix).
    // Test mode: a fixed-length mixed paper that ends with a score.
    let quiz = { bank: [], skill: "mix", test: false, length: 0, asked: 0, done: 0, correct: 0, q: null, answered: false, over: false };
    // One remembered skill per bank, so switching sections keeps your place.
    const lastSkill = {};

    function buildSkillChips() {
      skillFilterEl.innerHTML = "";
      [{ id: "mix", label: "Mixed" }, ...quiz.bank].forEach(s => {
        const b = document.createElement("button");
        b.className = "tab set" + (s.id === quiz.skill ? " active" : "");
        b.dataset.skill = s.id;
        b.textContent = s.label;
        b.addEventListener("click", () => {
          lastSkill[quiz.bankId] = s.id;
          startQuiz({ bank: quiz.bank, bankId: quiz.bankId, test: quiz.test, length: quiz.length });
        });
        skillFilterEl.appendChild(b);
      });
    }

    function startQuiz({ bank, bankId, test, length = 0 }) {
      quiz = {
        bank, bankId,
        skill: test ? "mix" : (lastSkill[bankId] || "mix"),
        test, length, asked: 0, done: 0, correct: 0, q: null, answered: false, over: false
      };
      buildSkillChips();
      newQuestion();
    }

    function newQuestion() {
      const pool = quiz.skill === "mix"
        ? quiz.bank
        : quiz.bank.filter(s => s.id === quiz.skill);
      const skill = pool[rnd(0, pool.length - 1)];
      const q = skill.gen();
      quiz.q = { ...q, type: q.type || "number", skill };
      quiz.answered = false;
      quiz.asked++;

      qLabelEl.textContent = skill.label;
      qTextEl.textContent = quiz.q.q;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      checkBtn.textContent = "✓ Check";

      const isChoice = quiz.q.type === "choice";
      ansInputEl.classList.toggle("hidden", isChoice);
      choicesEl.classList.toggle("hidden", !isChoice);
      ansInputEl.value = "";
      choicesEl.innerHTML = "";
      if (isChoice) {
        quiz.q.options.forEach(opt => {
          const b = document.createElement("button");
          b.className = "choice";
          b.textContent = opt;
          b.addEventListener("click", () => {
            choicesEl.querySelectorAll(".choice").forEach(c => c.classList.remove("picked"));
            b.classList.add("picked");
            quiz.picked = opt;
          });
          choicesEl.appendChild(b);
        });
        quiz.picked = null;
      } else {
        ansInputEl.focus();
      }
      updateQuizStatus();
    }

    function updateQuizStatus() {
      counterEl.textContent = quiz.test
        ? `Question ${Math.min(quiz.asked, quiz.length)} / ${quiz.length}`
        : `Question ${quiz.asked}`;
      setNameEl.textContent = `Score ${quiz.correct} / ${quiz.done}`;
    }

    function checkAnswer() {
      if (quiz.over) { startQuiz({ bank: quiz.bank, bankId: quiz.bankId, test: quiz.test, length: quiz.length }); return; }
      if (quiz.answered) { nextQuestion(); return; }

      const given = quiz.q.type === "choice" ? quiz.picked : ansInputEl.value.trim();
      if (given === null || given === "") return;
      const norm = v => String(v).trim().toLowerCase();
      const right = norm(given) === norm(quiz.q.a);
      quiz.answered = true;
      quiz.done++;
      if (right) quiz.correct++;
      feedbackEl.textContent = right
        ? "Correct! 🎉"
        : `Not quite — the answer is ${quiz.q.a}`;
      feedbackEl.className = "feedback " + (right ? "right" : "wrong");
      checkBtn.textContent = "Next question →";
      updateQuizStatus();
    }

    function nextQuestion() {
      if (quiz.over) { startQuiz({ bank: quiz.bank, bankId: quiz.bankId, test: quiz.test, length: quiz.length }); return; }
      if (quiz.test && quiz.asked >= quiz.length && quiz.answered) { finishTest(); return; }
      newQuestion();
    }

    function finishTest() {
      quiz.over = true;
      const pct = Math.round((quiz.correct / quiz.length) * 100);
      qLabelEl.textContent = "Result";
      qTextEl.textContent = `You scored ${quiz.correct} out of ${quiz.length} (${pct}%)`;
      feedbackEl.textContent = pct >= 80 ? "Excellent work! ⭐" : pct >= 50 ? "Good try — keep practising!" : "Let's practise a bit more 💪";
      feedbackEl.className = "feedback right";
      ansInputEl.classList.add("hidden");
      choicesEl.classList.add("hidden");
      checkBtn.textContent = "🔄 Start again";
    }

    // ---------------- reading view ----------------
    // chapter.js defines window.ENGLISH_CHAPTERS = [{id,title,author,type,
    // paragraphs:[...]}]. A local chapters.js may override it.
    const chapters = () => Array.isArray(window.ENGLISH_CHAPTERS) ? window.ENGLISH_CHAPTERS : [];
    let currentChapter = 0;
    let readAloudChunks = [], readAloudIdx = 0, reading = false;

    function buildChapterChips() {
      chapterFilterEl.innerHTML = "";
      chapters().forEach((c, i) => {
        const b = document.createElement("button");
        b.className = "tab set" + (i === currentChapter ? " active" : "");
        b.textContent = c.title;
        b.addEventListener("click", () => { currentChapter = i; renderChapter(); });
        chapterFilterEl.appendChild(b);
      });
    }

    function renderChapter() {
      stopReading();
      buildChapterChips();
      const list = chapters();
      readBodyEl.innerHTML = "";
      if (!list.length) {
        readTitleEl.textContent = "Reading chapters";
        readMetaEl.textContent = "";
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "No reading chapters are loaded. "
          + "Add them to chapter.js (or a local chapters.js file).";
        readBodyEl.appendChild(p);
        readerControlsEl.classList.add("hidden");
        counterEl.textContent = "";
        setNameEl.textContent = "Reading";
        return;
      }
      readerControlsEl.classList.remove("hidden");
      const ch = list[currentChapter];
      readTitleEl.textContent = ch.title;
      readMetaEl.textContent = [ch.author && "by " + ch.author, ch.type].filter(Boolean).join(" · ");
      (ch.paragraphs || []).forEach(text => {
        const p = document.createElement("p");
        p.textContent = text;
        readBodyEl.appendChild(p);
      });
      readBodyEl.parentElement.scrollTop = 0;
      counterEl.textContent = `${currentChapter + 1} / ${list.length}`;
      setNameEl.textContent = "Reading";
    }

    // Read the chapter aloud paragraph by paragraph, highlighting the current
    // one. speechSynthesis handles long English text more reliably than the
    // short-query TTS endpoint, and can be stopped cleanly.
    function readChapterAloud() {
      if (!("speechSynthesis" in window)) return;
      stopReading();
      readAloudChunks = [...readBodyEl.querySelectorAll("p")].filter(p => !p.classList.contains("empty"));
      if (!readAloudChunks.length) return;
      readAloudIdx = 0;
      reading = true;
      speakChunk();
    }

    function speakChunk() {
      if (!reading || readAloudIdx >= readAloudChunks.length) { stopReading(); return; }
      const p = readAloudChunks[readAloudIdx];
      readAloudChunks.forEach(x => x.classList.remove("speaking"));
      p.classList.add("speaking");
      p.scrollIntoView({ block: "center" });
      const u = new SpeechSynthesisUtterance(p.textContent);
      u.lang = "en-IN";
      u.rate = 0.9;
      u.onend = () => { readAloudIdx++; speakChunk(); };
      speechSynthesis.speak(u);
    }

    function stopReading() {
      reading = false;
      if ("speechSynthesis" in window) speechSynthesis.cancel();
      readBodyEl.querySelectorAll("p.speaking").forEach(p => p.classList.remove("speaking"));
    }

    function openDrawer() {
      sidebarEl.classList.add("open");
      overlayEl.classList.add("show");
    }

    function closeDrawer() {
      sidebarEl.classList.remove("open");
      overlayEl.classList.remove("show");
    }

    function setSet(name) {
      currentSet = name;
      setNameEl.textContent = setLabels[name];
      document.querySelectorAll(".tab.set").forEach(b =>
        b.classList.toggle("active", b.dataset.set === name));
      reshuffle();
    }

    function flipCard() {
      flipped = !flipped;
      cardEl.classList.toggle("flipped", flipped);
      if (autoSpeakEl.checked) {
        flipped ? speakWord() : speakLetter();
      }
    }

    function nextCard() {
      index = (index + 1) % deck.length;
      render();
    }

    function prevCard() {
      index = (index - 1 + deck.length) % deck.length;
      render();
    }

    function reshuffle() {
      deck = shuffle(sets[currentSet]());
      index = 0;
      render();
    }

    document.getElementById("flipBtn").addEventListener("click", flipCard);
    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", prevCard);
    document.getElementById("shuffleBtn").addEventListener("click", reshuffle);
    document.getElementById("scene").addEventListener("click", flipCard);

    document.getElementById("speakLetterBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakLetter();
    });
    document.getElementById("speakWordBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakWord();
    });

    document.getElementById("menuBtn").addEventListener("click", openDrawer);
    overlayEl.addEventListener("click", closeDrawer);
    document.querySelectorAll(".tab.set").forEach(b =>
      b.addEventListener("click", () => setSet(b.dataset.set)));

    document.getElementById("earBtn").addEventListener("click", speakLetter);
    document.getElementById("repeatBtn").addEventListener("click", speakLetter);
    document.getElementById("nextWriteBtn").addEventListener("click", nextCard);
    document.getElementById("shuffleWriteBtn").addEventListener("click", reshuffle);

    document.getElementById("readAloudBtn").addEventListener("click", readChapterAloud);
    document.getElementById("stopReadBtn").addEventListener("click", stopReading);
    checkBtn.addEventListener("click", checkAnswer);
    document.getElementById("nextQBtn").addEventListener("click", nextQuestion);
    document.getElementById("restartBtn").addEventListener("click", () =>
      startQuiz({ bank: quiz.bank, bankId: quiz.bankId, test: quiz.test, length: quiz.length }));
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDrawer();
      const handler = activity().onKey;
      if (handler) handler(e);
    });

    buildNav();
    const saved = localStorage.getItem("varnamalaMode");
    setMode(ACTIVITIES.some(a => a.id === saved) ? saved : ACTIVITIES[0].id);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
